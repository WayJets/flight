<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛩️ Private Flight Tracker - Real-Time Aircraft Monitoring</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #0a0e27;
        }

        .header {
            background: linear-gradient(135deg, #1a1f3a 0%, #16213e 100%);
            padding: 15px 20px;
            border-bottom: 2px solid #00b4d8;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            font-size: 14px;
        }

        .stats span {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            background: rgba(0, 180, 216, 0.1);
            border-radius: 5px;
            border-left: 3px solid #00b4d8;
        }

        .container {
            display: flex;
            flex: 1;
            gap: 0;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: #0f1419;
            border-right: 1px solid #1a2340;
            overflow-y: auto;
            padding: 15px;
            box-shadow: inset -2px 0 5px rgba(0, 0, 0, 0.5);
        }

        .sidebar h2 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #00b4d8;
            border-bottom: 2px solid #00b4d8;
            padding-bottom: 8px;
        }

        .aircraft-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .aircraft-item {
            padding: 10px;
            background: rgba(0, 180, 216, 0.08);
            border-left: 3px solid #00b4d8;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 180, 216, 0.2);
        }

        .aircraft-item:hover {
            background: rgba(0, 180, 216, 0.15);
            border-color: #00d4ff;
            transform: translateX(5px);
        }

        .aircraft-item.selected {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .callsign {
            font-weight: bold;
            font-size: 14px;
            color: #00d4ff;
            margin-bottom: 4px;
        }

        .details {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #a0a0a0;
        }

        .map-container {
            flex: 1;
            position: relative;
            background: #0a0e27;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .info-panel {
            width: 320px;
            background: #0f1419;
            border-left: 1px solid #1a2340;
            overflow-y: auto;
            padding: 15px;
            box-shadow: inset 2px 0 5px rgba(0, 0, 0, 0.5);
        }

        .info-panel h3 {
            font-size: 18px;
            color: #00d4ff;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #00b4d8;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .info {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background: rgba(0, 180, 216, 0.08);
            border-radius: 4px;
            border-left: 2px solid #00b4d8;
            font-size: 13px;
        }

        .label {
            color: #00b4d8;
            font-weight: 600;
        }

        .value {
            color: #a0f0ff;
            font-family: 'Courier New', monospace;
        }

        .popup {
            padding: 10px;
            color: #0a0e27;
        }

        .popup strong {
            color: #00b4d8;
            font-size: 14px;
        }

        .popup p {
            margin: 5px 0;
            font-size: 12px;
        }

        /* Scrollbar styling */
        .sidebar::-webkit-scrollbar,
        .info-panel::-webkit-scrollbar {
            width: 8px;
        }

        .sidebar::-webkit-scrollbar-track,
        .info-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb,
        .info-panel::-webkit-scrollbar-thumb {
            background: #00b4d8;
            border-radius: 4px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover,
        .info-panel::-webkit-scrollbar-thumb:hover {
            background: #00d4ff;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #00b4d8;
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 200px;
            }
            .info-panel {
                width: 200px;
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar, .info-panel {
                width: 100%;
                max-height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>✈️ Private Flight Tracker</h1>
            <div class="stats">
                <span>🔴 Active: <strong id="activeCount">0</strong></span>
                <span>📊 Total: <strong id="totalCount">0</strong></span>
                <span>⏰ Last: <strong id="lastUpdate">--:--:--</strong></span>
            </div>
        </header>

        <div class="container">
            <aside class="sidebar">
                <h2>Aircraft List</h2>
                <div class="aircraft-list" id="aircraftList">
                    <div class="loading">Loading aircraft...</div>
                </div>
            </aside>

            <main class="map-container">
                <div id="map"></div>
            </main>

            <aside class="info-panel" id="infoPanel" style="display: none;">
                <h3 id="selectedCallsign">Select Aircraft</h3>
                <div class="info" id="infoDetails"></div>
            </aside>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map
        const map = L.map('map').setView([40.7128, -74.0060], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        let aircraft = {};
        let markers = {};
        let selectedAircraft = null;

        // Fetch OpenSky data
        async function fetchAircraft() {
            try {
                const response = await fetch('https://opensky-network.org/api/states/all');
                const data = await response.json();
                
                if (data.states) {
                    aircraft = {};
                    data.states.forEach(state => {
                        const [icao, callsign, origin_country, time_position, last_contact, lon, lat, baro_altitude, on_ground, velocity, true_track, vertical_rate, sensors, geo_altitude, squawk, spi, position_source] = state;
                        
                        if (lat && lon) {
                            aircraft[icao] = {
                                icao,
                                callsign: callsign ? callsign.trim() : icao,
                                lat,
                                lon,
                                altitude: baro_altitude || geo_altitude || 0,
                                speed: velocity || 0,
                                heading: true_track || 0,
                                vertical_rate: vertical_rate || 0,
                                on_ground,
                                last_updated: new Date().toLocaleTimeString()
                            };
                        }
                    });
                    
                    updateDisplay();
                }
            } catch (error) {
                console.error('Error fetching aircraft:', error);
            }
        }

        function updateDisplay() {
            updateAircraftList();
            updateMap();
            updateStats();
        }

        function updateAircraftList() {
            const list = document.getElementById('aircraftList');
            const sorted = Object.values(aircraft).sort((a, b) => (b.altitude || 0) - (a.altitude || 0));
            
            list.innerHTML = sorted.map(ac => `
                <div class="aircraft-item ${selectedAircraft?.icao === ac.icao ? 'selected' : ''}" onclick="selectAircraft('${ac.icao}')">
                    <div class="callsign">${ac.callsign}</div>
                    <div class="details">
                        <span>${ac.altitude ? Math.round(ac.altitude) + ' ft' : '-'}</span>
                        <span>${ac.speed ? Math.round(ac.speed) + ' kt' : '-'}</span>
                    </div>
                </div>
            `).join('');
        }

        function updateMap() {
            Object.values(aircraft).forEach(ac => {
                const markerId = ac.icao;
                
                if (markers[markerId]) {
                    markers[markerId].setLatLng([ac.lat, ac.lon]);
                } else {
                    const color = selectedAircraft?.icao === ac.icao ? '#ff0000' : '#00b4d8';
                    const marker = L.circleMarker([ac.lat, ac.lon], {
                        radius: 8,
                        fillColor: color,
                        color: color,
                        weight: 2,
                        opacity: 0.8,
                        fillOpacity: 0.7
                    }).addTo(map);
                    
                    marker.bindPopup(`
                        <div class="popup">
                            <strong>${ac.callsign}</strong>
                            <p>ICAO: ${ac.icao}</p>
                            <p>Altitude: ${ac.altitude ? Math.round(ac.altitude) + ' ft' : '-'}</p>
                            <p>Speed: ${ac.speed ? Math.round(ac.speed) + ' kt' : '-'}</p>
                            <p>Heading: ${ac.heading ? Math.round(ac.heading) + '°' : '-'}</p>
                            <p>Last: ${ac.last_updated}</p>
                        </div>
                    `);
                    
                    markers[markerId] = marker;
                }
            });
        }

        function updateStats() {
            document.getElementById('activeCount').textContent = Object.keys(aircraft).length;
            document.getElementById('totalCount').textContent = Object.keys(aircraft).length;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        }

        function selectAircraft(icao) {
            selectedAircraft = aircraft[icao];
            
            const infoPanel = document.getElementById('infoPanel');
            infoPanel.style.display = 'block';
            
            document.getElementById('selectedCallsign').textContent = selectedAircraft.callsign || selectedAircraft.icao;
            
            document.getElementById('infoDetails').innerHTML = `
                <div class="info-row">
                    <span class="label">ICAO:</span>
                    <span class="value">${selectedAircraft.icao}</span>
                </div>
                <div class="info-row">
                    <span class="label">Altitude:</span>
                    <span class="value">${selectedAircraft.altitude ? Math.round(selectedAircraft.altitude) + ' ft' : '-'}</span>
                </div>
                <div class="info-row">
                    <span class="label">Speed:</span>
                    <span class="value">${selectedAircraft.speed ? Math.round(selectedAircraft.speed) + ' kt' : '-'}</span>
                </div>
                <div class="info-row">
                    <span class="label">Heading:</span>
                    <span class="value">${selectedAircraft.heading ? Math.round(selectedAircraft.heading) + '°' : '-'}</span>
                </div>
                <div class="info-row">
                    <span class="label">Vertical Rate:</span>
                    <span class="value">${selectedAircraft.vertical_rate ? Math.round(selectedAircraft.vertical_rate) + ' fpm' : '-'}</span>
                </div>
                <div class="info-row">
                    <span class="label">On Ground:</span>
                    <span class="value">${selectedAircraft.on_ground ? 'Yes' : 'No'}</span>
                </div>
                <div class="info-row">
                    <span class="label">Position:</span>
                    <span class="value">${selectedAircraft.lat.toFixed(4)}, ${selectedAircraft.lon.toFixed(4)}</span>
                </div>
                <div class="info-row">
                    <span class="label">Last Update:</span>
                    <span class="value">${selectedAircraft.last_updated}</span>
                </div>
            `;
            
            updateDisplay();
        }

        // Initial fetch and set interval
        fetchAircraft();
        setInterval(fetchAircraft, 5000);
    </script>
</body>
</html>
